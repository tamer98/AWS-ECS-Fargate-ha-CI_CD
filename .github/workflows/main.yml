name: MemoryCards-ECS CI/CD

on:
  push:
    branches: 
      - main

  workflow_dispatch:
    

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: development/memory-cards        
  ECS_SERVICE: demo_service                 
  ECS_CLUSTER: demo-cluster                
  ECS_TASK_DEFINITION: demo-application                                            
  CONTAINER_NAME: demo-container          
                                               
jobs:
  Build_And_Push:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 2
    
    outputs:
      image: ${{ steps.build-image.outputs.image }}
    
    steps:
    - name: Check out code and pull
      uses: actions/checkout@v2

    - name: install dependencies and Build the application
      working-directory: ./app
      run: |
         echo "starting http server"
         npx http-server -p 8080 &

    - name: wait for server to be upload
      run: sleep 5


    - name: Run tests
      run: |
         echo "testing app"
         curl http://localhost:8080

    - name: Stop application
      run: kill -9 $(lsof -t -i :8080)


    - name: Build Docker image
      run: |
         echo "building app image"
         docker build -t my-app:latest .


    - name: Deploy testing environment
      run: |
          echo "testing enviroment up"
          docker run -d --name app-con -p 80:80 my-app  
      
    - name: Check running containers and existed images
      run: |
         docker ps -a
         docker images
        
    - name: wait application to be upload
      run: |
         sleep 5
          
    - name: Run tests
      run: |
         echo "app container testing"
         curl http://localhost:80

    - name: Remove testing environment
      if: always()
      run: |
         echo "testing enviroment down"
         docker stop app-con 2>/dev/null || true
         docker rm app-con 2>/dev/null || true

        
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
         aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
         aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
         aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: tag, and push image to Amazon ECR
      id: build-image #need to check it
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: | 
         docker tag my-app:latest $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$IMAGE_TAG" >> $GITHUB_OUTPUT
        

  Deploy_To_ECS:
    needs: Build_And_Push
    name: Deploy
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
         aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
         aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
         aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1


    - name: Pulling image from ECR
      id: pull-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE: ${{ needs.Build_And_Push.outputs.image }}
      run: |
         echo "Pulling latest image from ECR"
         docker pull $IMAGE

  
    - name: Download current task definition
      run: |
        aws ecs describe-task-definition \
        --task-definition $ECS_TASK_DEFINITION \
        --query taskDefinition \
        --region $AWS_REGION \
        --output json > task-definition.json 
          
  
    - name: Fill in the new image ID in the Amazon ECS task definition
      id: task-def
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: task-definition.json
        container-name: ${{ env.CONTAINER_NAME }}
        image: ${{ steps.pull-image.outputs.image_latest }}


    - name: Deploy Amazon ECS task definition
      uses: aws-actions/amazon-ecs-deploy-task-definition@v1
      with:
        task-definition: ${{ steps.task-def.outputs.task-definition }}
        service: ${{ env.ECS_SERVICE }}
        cluster: ${{ env.ECS_CLUSTER }}
        wait-for-service-stability: true
        
